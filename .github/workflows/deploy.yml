name: opal-api CI/CD

on:
  push:
    branches: [main]
    paths: ['server/**', '.github/workflows/deploy.yml']
  pull_request:
    paths: ['server/**', '.github/workflows/deploy.yml']

defaults:
  run:
    working-directory: server

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Load deploy SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
      - name: Rsync source to droplet
        run: |
          rsync -az --delete \
            --exclude 'node_modules/' --exclude 'dist/' \
            --exclude '.env' --exclude '*.sqlite*' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/opal-api/"
      - name: Build and restart on droplet
        run: |
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'set -e; cd /opt/opal-api && npm install --no-audit --no-fund && npm run build && chown -R opal:opal /opt/opal-api && systemctl restart opal-api' < /dev/null
      - name: Healthcheck
        run: |
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            'for i in $(seq 1 15); do curl -fsS http://127.0.0.1:8080/healthz && exit 0; sleep 2; done; echo "healthcheck failed"; journalctl -u opal-api -n 30 --no-pager; exit 1' < /dev/null
